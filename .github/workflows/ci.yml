# GitHub Actions CI pipeline for frozensapphire.
name: CI

on:
  push:
    branches: ["development", "master"]
  pull_request:
    branches: ["development", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: "postgresql://frozensapphire:frozensapphire@127.0.0.1:5432/frozensapphire"
  REDIS_URL: "redis://127.0.0.1:6379"
  S3_ENDPOINT: "http://127.0.0.1:9000"
  S3_BUCKET: "frozensapphire"
  S3_ACCESS_KEY: "minio"
  S3_SECRET_KEY: "minio123"
  NEXTAUTH_SECRET: "ci-secret-for-build"
  NEXTAUTH_URL: "http://127.0.0.1:3000"
  PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"

jobs:
  commitlint:
    name: Commit Message Policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6

  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Comment policy check
        run: pnpm comments:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    needs: [static-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration Tests
    needs: [static-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: frozensapphire
          POSTGRES_PASSWORD: frozensapphire
          POSTGRES_DB: frozensapphire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U frozensapphire -d frozensapphire"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply Prisma migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed integration data
        run: pnpm seed:test

      - name: Run integration tests
        run: pnpm test:integration

  build:
    name: Build
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Build application
        run: pnpm build

  e2e-tests:
    name: Playwright E2E
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: frozensapphire
          POSTGRES_PASSWORD: frozensapphire
          POSTGRES_DB: frozensapphire
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U frozensapphire -d frozensapphire"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply Prisma migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed E2E data
        run: pnpm seed:e2e

      - name: Build application
        run: pnpm build

      - name: Install Playwright browser dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
