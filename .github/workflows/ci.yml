# GitHub Actions CI pipeline for frozensapphire.
name: CI

on:
  pull_request:
    branches: ["development", "master"]
  push:
    branches: ["development", "master"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  commitlint:
    name: Commit Message Policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6

  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Comment policy check
        run: pnpm comments:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    needs: [static-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration Tests
    needs: [static-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate external CI configuration
        env:
          INFISICAL_IDENTITY_ID: ${{ secrets.INFISICAL_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          node scripts/ci/validate-required-env.mjs --required \
            INFISICAL_IDENTITY_ID INFISICAL_PROJECT_SLUG NEON_API_KEY NEON_PROJECT_ID

      - name: Pull Infisical preview secrets
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_PREVIEW_ENV_SLUG || 'preview' }}

      - name: Create Neon branch for integration tests
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: ci-${{ github.event.pull_request.number || github.run_id }}-integration
          parent_branch: ${{ vars.NEON_BASE_BRANCH || 'master' }}

      - name: Export CI database URL
        run: |
          echo "DATABASE_URL=${{ steps.neon.outputs.db_url }}" >> "$GITHUB_ENV"
          echo "NEXTAUTH_URL=${NEXTAUTH_URL:-http://127.0.0.1:3000}" >> "$GITHUB_ENV"

      - name: Validate runtime environment
        run: |
          node scripts/ci/validate-required-env.mjs --required \
            DATABASE_URL NEXTAUTH_SECRET NEXTAUTH_URL

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply Prisma migrations
        run: pnpm prisma migrate deploy

      - name: Seed integration data
        run: pnpm prisma db seed

      - name: Run integration tests
        run: pnpm test:integration

      - name: Delete Neon integration branch
        if: always() && steps.neon.outputs.created == 'true'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_id: ${{ steps.neon.outputs.branch_id }}

  e2e-tests:
    name: Playwright E2E
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate external CI configuration
        env:
          INFISICAL_IDENTITY_ID: ${{ secrets.INFISICAL_IDENTITY_ID }}
          INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          node scripts/ci/validate-required-env.mjs --required \
            INFISICAL_IDENTITY_ID INFISICAL_PROJECT_SLUG NEON_API_KEY NEON_PROJECT_ID

      - name: Pull Infisical preview secrets
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_PREVIEW_ENV_SLUG || 'preview' }}

      - name: Create Neon branch for e2e tests
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: ci-${{ github.event.pull_request.number || github.run_id }}-e2e
          parent_branch: ${{ vars.NEON_BASE_BRANCH || 'master' }}

      - name: Export CI database URL
        run: |
          echo "DATABASE_URL=${{ steps.neon.outputs.db_url }}" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_BASE_URL=${PLAYWRIGHT_BASE_URL:-http://127.0.0.1:3000}" >> "$GITHUB_ENV"
          echo "NEXTAUTH_URL=${NEXTAUTH_URL:-http://127.0.0.1:3000}" >> "$GITHUB_ENV"

      - name: Validate runtime environment
        run: |
          node scripts/ci/validate-required-env.mjs --required \
            DATABASE_URL NEXTAUTH_SECRET NEXTAUTH_URL

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply Prisma migrations
        run: pnpm prisma migrate deploy

      - name: Seed e2e data
        run: pnpm prisma db seed

      - name: Build application
        run: pnpm build

      - name: Install Playwright browser dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

      - name: Delete Neon e2e branch
        if: always() && steps.neon.outputs.created == 'true'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_id: ${{ steps.neon.outputs.branch_id }}
