# Local development dependencies for frozensapphire.
# Includes PostgreSQL, Redis, and MinIO for S3-compatible storage.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: frozensapphire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: frozensapphire
      POSTGRES_PASSWORD: frozensapphire
      POSTGRES_DB: frozensapphire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: frozensapphire-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: frozensapphire-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
